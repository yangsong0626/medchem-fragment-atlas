services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install -e '.[dev]' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
